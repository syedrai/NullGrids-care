<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>Analytics - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  .sidebar{background:linear-gradient(180deg,#1a1a2e,#16213e);min-height:100vh;width:250px;position:fixed;top:0;left:0;}
  .sidebar a{color:rgba(255,255,255,.8);text-decoration:none;display:block;padding:10px 20px;border-radius:8px;margin:2px 10px;}
  .sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.12);color:#fff;}
  .main-content{margin-left:250px;padding:30px;}
  .topbar{background:#fff;padding:15px 30px;margin:-30px -30px 30px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
  .stat-card{border:none;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
  .chart-card{border:none;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
</style>
</head>
<body class="bg-light">
<div class="sidebar py-4">
  <div class="text-white text-center mb-4 px-3"><i class="fas fa-shield-alt fa-2x mb-2" style="color:#1a73e8"></i><div class="fw-bold">NullGrids-Care</div><small class="opacity-50">Admin Panel</small></div>
  <a href="/admin/dashboard"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
  <a href="/admin/appointments"><i class="fas fa-calendar-check me-2"></i>Appointments</a>
  <a href="/admin/doctors"><i class="fas fa-user-md me-2"></i>Doctors</a>
  <a href="/admin/users"><i class="fas fa-users me-2"></i>Users</a>
  <a href="/admin/leaves"><i class="fas fa-plane-departure me-2"></i>Leave Requests</a>
  <a href="/admin/security-logs"><i class="fas fa-shield-alt me-2"></i>Security Logs</a>
  <a href="/admin/analytics" class="active"><i class="fas fa-chart-bar me-2"></i>Analytics</a>
  <div style="position:absolute;bottom:20px;width:100%">
    <form th:action="@{/logout}" method="post" style="margin:0 10px">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" style="background:none;border:none;color:rgba(255,255,255,.8);padding:10px;width:100%;text-align:left;border-radius:8px;cursor:pointer;" onmouseover="this.style.background='rgba(255,255,255,.12)'" onmouseout="this.style.background='none'">
        <i class="fas fa-sign-out-alt me-2"></i>Logout
      </button>
    </form>
  </div>
</div>

<div class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold"><i class="fas fa-chart-bar me-2 text-primary"></i>Analytics &amp; Reports</h5></div>

  <div class="row mb-4">
    <div class="col-md-3">
      <div class="card stat-card text-white" style="background:linear-gradient(135deg,#1a73e8,#0d47a1)">
        <div class="card-body text-center"><i class="fas fa-users fa-2x mb-1"></i><h3 th:text="${totalUsers}">0</h3><p class="mb-0">Total Users</p></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card stat-card text-white" style="background:linear-gradient(135deg,#4caf50,#2e7d32)">
        <div class="card-body text-center"><i class="fas fa-user-md fa-2x mb-1"></i><h3 th:text="${totalDoctors}">0</h3><p class="mb-0">Doctors</p></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card stat-card text-white" style="background:linear-gradient(135deg,#ff9800,#e65100)">
        <div class="card-body text-center"><i class="fas fa-calendar-check fa-2x mb-1"></i><h3 th:text="${totalAppointments}">0</h3><p class="mb-0">Appointments</p></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card stat-card text-white" style="background:linear-gradient(135deg,#9c27b0,#6a1b9a)">
        <div class="card-body text-center"><i class="fas fa-clock fa-2x mb-1"></i><h3 th:text="${pendingAppointments}">0</h3><p class="mb-0">Pending</p></div>
      </div>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-md-8">
      <div class="card chart-card">
        <div class="card-header bg-white py-3"><h6 class="mb-0 fw-bold"><i class="fas fa-chart-line me-2 text-primary"></i>Appointments (Last 30 Days)</h6></div>
        <div class="card-body"><canvas id="apptLine" height="100"></canvas></div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card chart-card">
        <div class="card-header bg-white py-3"><h6 class="mb-0 fw-bold"><i class="fas fa-chart-pie me-2 text-warning"></i>Status Breakdown</h6></div>
        <div class="card-body"><canvas id="statusDonut" height="200"></canvas></div>
      </div>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-md-6">
      <div class="card chart-card">
        <div class="card-header bg-white py-3"><h6 class="mb-0 fw-bold"><i class="fas fa-chart-bar me-2 text-success"></i>Doctor Utilization</h6></div>
        <div class="card-body"><canvas id="doctorBar" height="200"></canvas></div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card chart-card">
        <div class="card-header bg-white py-3"><h6 class="mb-0 fw-bold"><i class="fas fa-user-plus me-2 text-info"></i>Patient Registrations (30 Days)</h6></div>
        <div class="card-body"><canvas id="patientLine" height="200"></canvas></div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-6">
      <div class="card chart-card">
        <div class="card-header bg-white py-3"><h6 class="mb-0 fw-bold"><i class="fas fa-plane-departure me-2 text-danger"></i>Leave vs Cancellations</h6></div>
        <div class="card-body"><canvas id="leaveBar" height="200"></canvas></div>
      </div>
    </div>
  </div>
</div>

<span id="d-appt"   style="display:none" th:text="${apptPerDayJson}"></span>
<span id="d-util"   style="display:none" th:text="${doctorUtilJson}"></span>
<span id="d-status" style="display:none" th:text="${statusJson}"></span>
<span id="d-reg"    style="display:none" th:text="${patientRegJson}"></span>
<span id="d-leave"  style="display:none" th:text="${leaveImpactJson}"></span>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/js/analytics-charts.js"></script>
</body>
</html>
