<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>Users - NullGrids-Care</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  .sidebar{background:linear-gradient(180deg,#1a1a2e,#16213e);min-height:100vh;width:250px;position:fixed;top:0;left:0;}
  .sidebar a{color:rgba(255,255,255,.8);text-decoration:none;display:block;padding:10px 20px;border-radius:8px;margin:2px 10px;}
  .sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.12);color:#fff;}
  .main-content{margin-left:250px;padding:30px;}
  .topbar{background:#fff;padding:15px 30px;margin:-30px -30px 30px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
</style>
</head>
<body class="bg-light">
<div class="sidebar py-4">
  <div class="text-white text-center mb-4 px-3"><i class="fas fa-shield-alt fa-2x mb-2" style="color:#1a73e8"></i><div class="fw-bold">NullGrids-Care</div><small class="opacity-50">Admin Panel</small></div>
  <a href="/admin/dashboard"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
  <a href="/admin/appointments"><i class="fas fa-calendar-check me-2"></i>Appointments</a>
  <a href="/admin/doctors"><i class="fas fa-user-md me-2"></i>Doctors</a>
  <a href="/admin/users" class="active"><i class="fas fa-users me-2"></i>Users</a>
  <a href="/admin/leaves"><i class="fas fa-plane-departure me-2"></i>Leave Requests</a>
  <a href="/admin/security-logs"><i class="fas fa-shield-alt me-2"></i>Security Logs</a>
  <a href="/admin/analytics"><i class="fas fa-chart-bar me-2"></i>Analytics</a>
  <div style="position:absolute;bottom:20px;width:100%">
    <form th:action="@{/logout}" method="post" style="margin:0 10px">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" style="background:none;border:none;color:rgba(255,255,255,.8);padding:10px;width:100%;text-align:left;border-radius:8px;cursor:pointer;" onmouseover="this.style.background='rgba(255,255,255,.12)'" onmouseout="this.style.background='none'">
        <i class="fas fa-sign-out-alt me-2"></i>Logout
      </button>
    </form>
  </div>
</div>
<div class="main-content">
  <div class="topbar d-flex justify-content-between align-items-center">
    <h5 class="mb-0 fw-bold"><i class="fas fa-users me-2 text-primary"></i>User Management</h5>
    <form th:action="@{/admin/users}" method="get" class="d-flex gap-2">
      <input type="text" name="search" class="form-control form-control-sm" placeholder="Search name or email..." th:value="${search}" style="width:250px">
      <button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-search"></i></button>
      <a th:if="${search}" href="/admin/users" class="btn btn-outline-secondary btn-sm">Clear</a>
    </form>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-dark">
          <tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Age</th><th>Gender</th><th>Blood</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr th:each="u, i : ${users}">
            <td th:text="${i.count}"></td>
            <td class="fw-semibold" th:text="${u.name}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.phone ?: '-'}"></td>
            <td><span class="badge" th:classappend="${u.role.name()=='ADMIN'}?'bg-danger':(${u.role.name()=='DOCTOR'}?'bg-success':'bg-primary')" th:text="${u.role}"></span></td>
            <td th:text="${u.age ?: '-'}"></td>
            <td th:text="${u.gender ?: '-'}"></td>
            <td th:text="${u.bloodGroup ?: '-'}"></td>
            <td>
              <span th:if="${u.accountLocked}" class="badge bg-danger"><i class="fas fa-lock me-1"></i>Locked</span>
              <span th:unless="${u.accountLocked}" class="badge bg-success"><i class="fas fa-unlock me-1"></i>Active</span>
            </td>
            <td><small th:text="${#temporals.format(u.createdAt,'dd MMM yyyy')}"></small></td>
            <td class="d-flex gap-1">
              <a th:if="${u.role.name()=='PATIENT'}" th:href="@{/admin/users/profile/{id}(id=${u.id})}" class="btn btn-sm btn-info text-white"><i class="fas fa-eye"></i></a>
              <a th:if="${u.role.name()!='ADMIN'}" th:href="@{/admin/users/toggle/{id}(id=${u.id})}"
                 class="btn btn-sm" th:classappend="${u.accountLocked}?'btn-success':'btn-warning'"
                 th:onclick="return confirm('Toggle account lock?')">
                <i class="fas" th:classappend="${u.accountLocked}?'fa-unlock':'fa-lock'"></i>
              </a>
            </td>
          </tr>
          <tr th:if="${users.empty}"><td colspan="11" class="text-center text-muted py-4">No users found.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
