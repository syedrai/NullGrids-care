<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>Notifications</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  .sidebar{background:linear-gradient(180deg,#1b5e20,#2e7d32);min-height:100vh;width:240px;position:fixed;top:0;left:0;}
  .sidebar a{color:rgba(255,255,255,.85);text-decoration:none;display:block;padding:10px 20px;border-radius:8px;margin:2px 10px;}
  .sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.15);color:#fff;}
  .main-content{margin-left:240px;padding:30px;}
  .topbar{background:#fff;padding:15px 30px;margin:-30px -30px 30px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
</style>
</head>
<body class="bg-light">
<div class="sidebar py-4">
  <div class="text-white text-center mb-4 px-3"><i class="fas fa-stethoscope fa-2x mb-2"></i><div class="fw-bold">NullGrids-Care</div></div>
  <a href="/doctor/dashboard"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
  <a href="/doctor/appointments"><i class="fas fa-calendar-check me-2"></i>Appointments</a>
  <a href="/doctor/add-patient"><i class="fas fa-user-plus me-2"></i>Add Patient</a>
  <a href="/doctor/profile"><i class="fas fa-user-edit me-2"></i>My Profile</a>
  <a href="/doctor/notifications" class="active"><i class="fas fa-bell me-2"></i>Notifications</a>
  <div style="position:absolute;bottom:20px;width:100%">
    <form th:action="@{/logout}" method="post" style="margin:0 10px">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" style="background:none;border:none;color:rgba(255,255,255,.85);padding:10px 10px;width:100%;text-align:left;border-radius:8px;cursor:pointer;" onmouseover="this.style.background='rgba(255,255,255,.15)'" onmouseout="this.style.background='none'">
        <i class="fas fa-sign-out-alt me-2"></i>Logout
      </button>
    </form>
  </div>
</div>
<div class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold"><i class="fas fa-bell me-2 text-success"></i>Notifications</h5></div>
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <div th:if="${notifications.empty}" class="text-center py-5 text-muted">
        <i class="fas fa-bell-slash fa-3x mb-3 opacity-25"></i><p>No notifications yet.</p>
      </div>
      <div th:each="n : ${notifications}" class="d-flex align-items-start p-3 border-bottom">
        <div class="me-3 mt-1">
          <i class="fas"
             th:classappend="${n.type=='LEAVE_APPROVED'}?'fa-check-circle text-success':
                             (${n.type=='PEER_LEAVE_NOTICE'}?'fa-info-circle text-primary':
                             (${n.type=='LEAVE_REJECTED'}?'fa-times-circle text-danger':'fa-bell text-warning'))"></i>
        </div>
        <div>
          <p class="mb-1" th:text="${n.message}"></p>
          <small class="text-muted" th:text="${n.createdAt}"></small>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
