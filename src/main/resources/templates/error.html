<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>Error - NullGrids-Care</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  body{background:linear-gradient(135deg,#0d47a1,#1565c0);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .error-card{background:#fff;border-radius:20px;padding:50px 40px;max-width:550px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
  .error-icon{font-size:80px;margin-bottom:20px;}
  .error-code{font-size:72px;font-weight:900;background:linear-gradient(135deg,#0d47a1,#e53935);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
</style>
</head>
<body>
<div class="error-card">
  <div class="error-icon">
    <span th:if="${status == 404}">🔍</span>
    <span th:if="${status == 403}">🔒</span>
    <span th:if="${status == 500}">⚠️</span>
    <span th:unless="${status == 404 or status == 403 or status == 500}">❌</span>
  </div>
  <div class="error-code" th:text="${status}">Error</div>
  <h3 class="fw-bold mt-2 mb-3" th:text="${error}">Something went wrong</h3>
  <p class="text-muted mb-4" th:text="${message != null and message != '' ? message : 'An unexpected error occurred. Please try again or go back to the dashboard.'}"></p>
  <div class="d-flex gap-3 justify-content-center flex-wrap">
    <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
      <i class="fas fa-arrow-left me-2"></i>Go Back
    </a>
    <a href="/dashboard" class="btn btn-primary px-4">
      <i class="fas fa-home me-2"></i>Dashboard
    </a>
  </div>
  <hr class="my-4">
  <small class="text-muted"><i class="fas fa-shield-alt me-1"></i>NullGrids-Care &mdash; If this keeps happening, please contact support.</small>
</div>
</body>
</html>
