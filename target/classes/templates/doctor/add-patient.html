<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>Add Patient - Doctor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  .sidebar{background:linear-gradient(180deg,#1b5e20,#2e7d32);min-height:100vh;width:240px;position:fixed;top:0;left:0;}
  .sidebar a{color:rgba(255,255,255,.85);text-decoration:none;display:block;padding:10px 20px;border-radius:8px;margin:2px 10px;}
  .sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.15);color:#fff;}
  .main-content{margin-left:240px;padding:30px;}
  .topbar{background:#fff;padding:15px 30px;margin:-30px -30px 30px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
</style>
</head>
<body class="bg-light">
<div class="sidebar py-4">
  <div class="text-white text-center mb-4 px-3"><i class="fas fa-stethoscope fa-2x mb-2"></i><div class="fw-bold">NullGrids-Care</div><small class="opacity-75">Doctor Portal</small></div>
  <a href="/doctor/dashboard"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
  <a href="/doctor/appointments"><i class="fas fa-calendar-check me-2"></i>Appointments</a>
  <a href="/doctor/add-patient" class="active"><i class="fas fa-user-plus me-2"></i>Add Patient</a>
  <a href="/doctor/profile"><i class="fas fa-user-edit me-2"></i>My Profile</a>
  <a href="/doctor/notifications"><i class="fas fa-bell me-2"></i>Notifications</a>
  <div style="position:absolute;bottom:20px;width:100%">
    <form th:action="@{/logout}" method="post" style="margin:0 10px">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" style="background:none;border:none;color:rgba(255,255,255,.85);padding:10px;width:100%;text-align:left;border-radius:8px;cursor:pointer;" onmouseover="this.style.background='rgba(255,255,255,.15)'" onmouseout="this.style.background='none'">
        <i class="fas fa-sign-out-alt me-2"></i>Logout
      </button>
    </form>
  </div>
</div>

<div class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold"><i class="fas fa-user-plus me-2 text-success"></i>Add Special Patient</h5></div>

  <div th:if="${param.added}" class="alert alert-success alert-dismissible mb-4">
    <i class="fas fa-check-circle me-2"></i>Patient added successfully! Default password: <strong>Patient@123</strong>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger mb-4" th:text="${error}"></div>

  <div class="card border-0 shadow-sm" style="max-width:700px">
    <div class="card-body p-4">
      <form th:action="@{/doctor/add-patient}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Full Name *</label>
            <input type="text" name="name" class="form-control" required placeholder="Patient full name">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Email *</label>
            <input type="email" name="email" class="form-control" required placeholder="patient@gmail.com"
                   pattern="[a-zA-Z0-9._%+\-]+@gmail\.com" title="Only @gmail.com accepted">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Phone *</label>
            <div class="input-group">
              <span class="input-group-text">+91</span>
              <input type="text" name="phone" class="form-control" required pattern="[0-9]{10}" maxlength="10" placeholder="9876543210">
            </div>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label fw-semibold">Age</label>
            <input type="number" name="age" class="form-control" min="1" max="120" placeholder="25">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label fw-semibold">Gender</label>
            <select name="gender" class="form-select">
              <option value="">-- Select --</option>
              <option>Male</option><option>Female</option><option>Other</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Blood Group</label>
            <select name="bloodGroup" class="form-select">
              <option value="">-- Select --</option>
              <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Address</label>
            <input type="text" name="address" class="form-control" placeholder="Patient address">
          </div>
          <div class="col-12 mb-3">
            <label class="form-label fw-semibold">Medical History / Notes</label>
            <textarea name="medicalHistory" class="form-control" rows="3" placeholder="Known conditions, allergies, previous treatments..."></textarea>
          </div>
        </div>
        <div class="alert alert-info py-2 small mb-3">
          <i class="fas fa-info-circle me-1"></i>Default login password will be <strong>Patient@123</strong>. Patient should change it after first login.
        </div>
        <button type="submit" class="btn btn-success px-4"><i class="fas fa-user-plus me-2"></i>Add Patient</button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
